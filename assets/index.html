<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Tether - Terminal Controller</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <h1>Tether</h1>
            <div id="header-actions">
                <button id="new-terminal-btn" aria-label="New Terminal">+ New</button>
                <button id="refresh-btn" aria-label="Refresh">↻</button>
            </div>
        </header>

        <!-- Terminal Tabs -->
        <div id="terminal-tabs"></div>

        <!-- Terminal Views (all visible, scrollable) -->
        <div id="terminal-views"></div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden">
            <div class="empty-icon">⌧</div>
            <p>No terminals open</p>
            <button id="empty-new-btn">+ New Terminal</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
